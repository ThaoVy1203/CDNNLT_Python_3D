<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập - Geo3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
.auth-container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  background: linear-gradient(135deg, var(--gold-bg), var(--indigo-bg));
  position: relative;
  overflow: hidden;
}
.auth-container::before {
  content: '';
  position: absolute;
  inset: 0;
  background: url('data:image/svg+xml,<svg width="60" height="60" xmlns="http://www.w3.org/2000/svg"><circle cx="30" cy="30" r="1.5" fill="rgba(160,120,64,0.1)"/></svg>');
  opacity: 0.5;
}
.auth-card {
  position: relative;
  z-index: 1;
  background: var(--white);
  border-radius: 16px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 420px;
  padding: 40px;
}
.auth-header {
  text-align: center;
  margin-bottom: 32px;
}
.auth-header .logo {
  font-family: var(--serif);
  font-size: 36px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 8px;
}
.auth-header .logo em {
  color: var(--gold);
  font-style: italic;
}
.auth-header h2 {
  font-size: 20px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 6px;
}
.auth-header p {
  font-size: 13px;
  color: var(--ink-3);
}
.form-group {
  margin-bottom: 16px;
}
.form-label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-2);
  margin-bottom: 6px;
}
.form-input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border-md);
  border-radius: 6px;
  font-family: var(--sans);
  font-size: 13px;
  color: var(--ink);
  transition: all .2s;
}
.form-input:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 3px var(--gold-bg);
}
.form-input::placeholder {
  color: var(--ink-4);
}
.btn-submit {
  width: 100%;
  padding: 11px;
  background: var(--gold);
  color: var(--white);
  border: none;
  border-radius: 6px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
  margin-top: 4px;
}
.btn-submit:hover {
  background: var(--gold-lt);
}
.btn-guest {
  width: 100%;
  padding: 11px;
  background: transparent;
  color: var(--ink-2);
  border: 1px solid var(--border-md);
  border-radius: 6px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 400;
  cursor: pointer;
  transition: all .2s;
  margin-top: 10px;
}
.btn-guest:hover {
  border-color: var(--gold);
  color: var(--gold);
}
.divider {
  display: flex;
  align-items: center;
  margin: 20px 0;
  color: var(--ink-4);
  font-size: 11px;
}
.divider::before,
.divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.divider::before {
  margin-right: 12px;
}
.divider::after {
  margin-left: 12px;
}
.auth-footer {
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  color: var(--ink-3);
}
.auth-footer a {
  color: var(--gold);
  text-decoration: none;
  font-weight: 500;
}
.auth-footer a:hover {
  text-decoration: underline;
}
.alert {
  padding: 10px 14px;
  border-radius: 6px;
  font-size: 12px;
  margin-bottom: 16px;
  display: none;
}
@media (max-width: 860px) {
  .auth-container {
    grid-template-columns: 1fr;
  }
  .auth-left {
    display: none;
  }
}
.alert-error {
  background: rgba(184,64,64,0.1);
  border: 1px solid rgba(184,64,64,0.2);
  color: var(--red);
}
.alert-success {
  background: var(--teal-bg);
  border: 1px solid rgba(42,122,98,0.2);
  color: var(--teal);
}
@media (max-width: 860px) {
  .auth-card {
    padding: 32px 24px;
  }
}
</style>
</head>
<body>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">Geo<em>3D</em></div>
      <h2>Đăng nhập</h2>
      <p>Chào mừng trở lại!</p>
    </div>

    <div id="alert" class="alert"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email hoặc tên đăng nhập</label>
        <input type="text" class="form-input" id="username" placeholder="Nhập email hoặc username" required>
      </div>

      <div class="form-group">
        <label class="form-label">Mật khẩu</label>
        <input type="password" class="form-input" id="password" placeholder="Nhập mật khẩu" required>
      </div>

      <button type="submit" class="btn-submit">Đăng nhập</button>
    </form>

    <div class="divider">hoặc</div>

    <button class="btn-guest" onclick="continueAsGuest()">
      Tiếp tục với tư cách khách
    </button>

    <div class="auth-footer">
      Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
    </div>
  </div>
</div>

<script src="auth.js"></script>
</body>
</html>
