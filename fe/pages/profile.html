<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thông tin cá nhân - Geo3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Nunito:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="../css/profile.css">
</head>
<body>

<div id="topbar-container"></div>
<script src="../js/auth.js"></script>
<script src="../js/topbar.js"></script>
<script>
  document.getElementById('topbar-container').innerHTML = renderTopbar('');
  window.addEventListener('DOMContentLoaded', function() {
    initTopbar();
    loadProfile();
  });
</script>

<div class="profile-container">
  <!-- Profile Header -->
  <div class="profile-header">
    <div class="profile-avatar" id="avatar">U</div>
    <div class="profile-info">
      <h1 class="profile-name" id="userName">Người dùng</h1>
      <span class="profile-role" id="userRole">Thành viên</span>
      <div class="profile-meta">
        <span>📧 <span id="userEmail">email@example.com</span></span>
        <span>📅 Tham gia: <span id="joinDate">01/01/2024</span></span>
      </div>
    </div>
    <div class="profile-actions">
      <button class="btn-edit" onclick="editProfile()">Chỉnh sửa</button>
    </div>
  </div>

  <div class="profile-grid">
    <!-- Left Column -->
    <div>
      <!-- Account Info -->
      <div class="profile-section">
        <h2 class="section-title">Thông tin tài khoản</h2>
        <div class="info-row">
          <span class="info-label">Họ và tên</span>
          <span class="info-value" id="fullName">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">Tên đăng nhập</span>
          <span class="info-value" id="username">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">Email</span>
          <span class="info-value" id="email">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">Vai trò</span>
          <span class="info-value" id="role">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">Ngày tham gia</span>
          <span class="info-value" id="createdAt">-</span>
        </div>
      </div>

      <!-- History -->
      <div class="profile-section" style="margin-top:24px">
        <h2 class="section-title">Lịch sử giải bài</h2>
        <div id="historyList">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <p>Chưa có lịch sử giải bài</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Column -->
    <div>
      <!-- Statistics -->
      <div class="profile-section">
        <h2 class="section-title">Thống kê</h2>
        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-number" id="totalProblems">0</div>
            <div class="stat-label">Bài đã giải</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="thisWeek">0</div>
            <div class="stat-label">Tuần này</div>
          </div>
        </div>
        <div class="stat-card" style="background:var(--gold-bg)">
          <div class="stat-number" style="color:var(--gold)" id="streak">0</div>
          <div class="stat-label">Ngày liên tiếp</div>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="profile-section" style="margin-top:24px">
        <h2 class="section-title">Thao tác nhanh</h2>
        <button class="btn-filled" style="width:100%;margin-bottom:10px" onclick="window.location.href='solver.html'">
          ➕ Giải bài mới
        </button>
        <button class="btn-line" style="width:100%;margin-bottom:10px" onclick="alert('Tính năng đang phát triển')">
          📊 Xem báo cáo
        </button>
        <button class="btn-line" style="width:100%" onclick="alert('Tính năng đang phát triển')">
          ⚙️ Cài đặt
        </button>
      </div>
    </div>
  </div>
</div>

<script>
// Load user profile
function loadProfile() {
  const user = getCurrentUser();
  
  if (!user) {
    window.location.href = 'login.html';
    return;
  }
  
  // Update avatar
  const avatar = document.getElementById('avatar');
  avatar.textContent = (user.fullname || user.username).charAt(0).toUpperCase();
  
  // Update header
  document.getElementById('userName').textContent = user.fullname || user.username;
  document.getElementById('userEmail').textContent = user.email || '-';
  document.getElementById('userRole').textContent = getRoleText(user.role);
  
  // Update info section
  document.getElementById('fullName').textContent = user.fullname || '-';
  document.getElementById('username').textContent = user.username;
  document.getElementById('email').textContent = user.email || '-';
  document.getElementById('role').textContent = getRoleText(user.role);
  
  if (user.createdAt) {
    const date = new Date(user.createdAt);
    document.getElementById('createdAt').textContent = date.toLocaleDateString('vi-VN');
    document.getElementById('joinDate').textContent = date.toLocaleDateString('vi-VN');
  }
  
  // Load history
  loadHistory();
  
  // Load statistics
  loadStatistics();
}

function getRoleText(role) {
  const roles = {
    'guest': 'Khách',
    'member': 'Thành viên',
    'admin': 'Quản trị viên'
  };
  return roles[role] || 'Thành viên';
}

function loadHistory() {
  const history = getHistory();
  const historyList = document.getElementById('historyList');
  
  if (history.length === 0) {
    return; // Keep empty state
  }
  
  historyList.innerHTML = history.slice(0, 5).map(item => `
    <div class="history-item">
      <div class="history-title">${item.title || 'Bài toán hình học'}</div>
      <div class="history-meta">
        <span>📅 ${new Date(item.timestamp).toLocaleDateString('vi-VN')}</span>
        <span>⏱️ ${new Date(item.timestamp).toLocaleTimeString('vi-VN', {hour: '2-digit', minute: '2-digit'})}</span>
      </div>
    </div>
  `).join('');
}

function loadStatistics() {
  const history = getHistory();
  
  // Total problems
  document.getElementById('totalProblems').textContent = history.length;
  
  // This week
  const weekAgo = new Date();
  weekAgo.setDate(weekAgo.getDate() - 7);
  const thisWeek = history.filter(item => new Date(item.timestamp) > weekAgo).length;
  document.getElementById('thisWeek').textContent = thisWeek;
  
  // Streak (simplified - just show total for now)
  document.getElementById('streak').textContent = Math.min(history.length, 7);
}

function editProfile() {
  alert('Tính năng chỉnh sửa hồ sơ đang được phát triển!');
}
</script>

</body>
</html>
