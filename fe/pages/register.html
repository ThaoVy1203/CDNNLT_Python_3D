<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng ký - Geo3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Nunito:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>
.auth-container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  background: linear-gradient(135deg, var(--indigo-bg), var(--gold-bg));
  position: relative;
  overflow: hidden;
}
.auth-container::before {
  content: '';
  position: absolute;
  inset: 0;
  background: url('data:image/svg+xml,<svg width="60" height="60" xmlns="http://www.w3.org/2000/svg"><circle cx="30" cy="30" r="1.5" fill="rgba(61,82,160,0.1)"/></svg>');
  opacity: 0.5;
}
.auth-card {
  position: relative;
  z-index: 1;
  background: var(--white);
  border-radius: 16px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 480px;
  padding: 40px;
}
.auth-header {
  text-align: center;
  margin-bottom: 28px;
}
.auth-header .logo {
  font-family: var(--serif);
  font-size: 36px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 8px;
}
.auth-header .logo em {
  color: var(--gold);
  font-style: italic;
}
.auth-header h2 {
  font-size: 20px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 6px;
}
.auth-header p {
  font-size: 13px;
  color: var(--ink-3);
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.form-group {
  margin-bottom: 14px;
}
.form-label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-2);
  margin-bottom: 6px;
}
.form-input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border-md);
  border-radius: 6px;
  font-family: var(--sans);
  font-size: 13px;
  color: var(--ink);
  transition: all .2s;
}
.form-input:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 3px var(--gold-bg);
}
.form-input::placeholder {
  color: var(--ink-4);
}
.btn-submit {
  width: 100%;
  padding: 11px;
  background: var(--gold);
  color: var(--white);
  border: none;
  border-radius: 6px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
  margin-top: 4px;
}
.btn-submit:hover {
  background: var(--gold-lt);
}
.auth-footer {
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  color: var(--ink-3);
}
.auth-footer a {
  color: var(--gold);
  text-decoration: none;
  font-weight: 500;
}
.auth-footer a:hover {
  text-decoration: underline;
}
.alert {
  padding: 10px 14px;
  border-radius: 6px;
  font-size: 12px;
  margin-bottom: 16px;
  display: none;
}
.alert-error {
  background: rgba(184,64,64,0.1);
  border: 1px solid rgba(184,64,64,0.2);
  color: var(--red);
}
.alert-success {
  background: var(--teal-bg);
  border: 1px solid rgba(42,122,98,0.2);
  color: var(--teal);
}
@media (max-width: 860px) {
  .auth-card {
    padding: 32px 24px;
  }
  .form-row {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">Geo<em>3D</em></div>
      <h2>Đăng ký</h2>
      <p>Tạo tài khoản miễn phí</p>
    </div>

    <div id="alert" class="alert"></div>

    <form id="registerForm" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label class="form-label">Họ và tên</label>
        <input type="text" class="form-input" id="fullname" placeholder="Nguyễn Văn A" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="email" placeholder="email@example.com" required>
        </div>

        <div class="form-group">
          <label class="form-label">Tên đăng nhập</label>
          <input type="text" class="form-input" id="username" placeholder="username" required minlength="3">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Mật khẩu</label>
          <input type="password" class="form-input" id="password" placeholder="Tối thiểu 6 ký tự" required minlength="6">
        </div>

        <div class="form-group">
          <label class="form-label">Xác nhận mật khẩu</label>
          <input type="password" class="form-input" id="confirmPassword" placeholder="Nhập lại mật khẩu" required>
        </div>
      </div>

      <button type="submit" class="btn-submit">Đăng ký</button>
    </form>

    <div class="auth-footer">
      Đã có tài khoản? <a href="login.html">Đăng nhập</a>
    </div>
  </div>
</div>

<script src="../js/auth.js"></script>
</body>
</html>
